<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_KEY = "sb_publishable__jf6STEu_EO57bk21V4MXw_MFLkBbHu";
        const TABLE_NAME = "parcels"; 

        function App() {
            const [supabaseClient, setSupabaseClient] = useState(null);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [message, setMessage] = useState(null);
            const [stats, setStats] = useState({ totalOrders: 0, totalCOD: 0, todayCOD: 0 });
            const [orders, setOrders] = useState([]);
            
            const [isProcessing, setIsProcessing] = useState(false);
            const [cleanedData, setCleanedData] = useState([]);
            const [cleansingSummary, setCleansingSummary] = useState({ totalRaw: 0, validCount: 0, fixedPhoneCount: 0, skippedCount: 0 });
            const [processLogs, setProcessLogs] = useState([]);

            const EMPIRE_GOAL = 100000;

            const showToast = (txt, type = 'success') => {
                setMessage({ text: txt, type });
                setTimeout(() => setMessage(null), 4000);
            };

            // 🔥 แก้ไขจุดบกพร่องเรียกโครงสร้างไฟล์ CDN สำหรับ Vercel โดยเฉพาะ
            useEffect(() => {
                const initScripts = async () => {
                    try {
                        // โหลด Supabase เจนเนอเรชันมาตรฐาน
                        if (!window.supabase) {
                            const sb = document.createElement('script');
                            sb.src = 'https://jsdelivr.net';
                            sb.async = true;
                            sb.onload = () => {
                                if (window.supabase) {
                                    setSupabaseClient(window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY));
                                }
                            };
                            document.body.appendChild(sb);
                        } else {
                            setSupabaseClient(window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY));
                        }
                        
                        // เปลี่ยน CDN ของ ตารางสเปรดชีต (SheetJS) เป็นลิงก์ที่เสถียรบนระบบเซิร์ฟเวอร์จริง
                        if (!window.XLSX) {
                            const xlsx = document.createElement('script');
                            xlsx.src = 'https://cloudflare.com';
                            xlsx.async = true;
                            document.body.appendChild(xlsx);
                        }
                    } catch (err) {
                        console.error("CDN Loading Error:", err);
                    }
                };
                
                initScripts();
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (supabaseClient) fetchAdminData();
            }, [supabaseClient]);

            const fetchAdminData = async () => {
                if (!supabaseClient) return;
                try {
                    const { data, error } = await supabaseClient.from(TABLE_NAME).select("*").order("created_at", { ascending: false });
                    if (!error && data) {
                        const totalCOD = data.reduce((sum, item) => sum + Number(item.cod || 0), 0);
                        const todayStr = new Date().toLocaleDateString('en-CA');
                        const todayCOD = data
                            .filter(item => item.created_at && item.created_at.startsWith(todayStr))
                            .reduce((sum, item) => sum + Number(item.cod || 0), 0);
                        setOrders(data);
                        setStats({ totalOrders: data.length, totalCOD, todayCOD });
                    }
                } catch (e) { console.error(e); }
            };

            const cleanPhoneNumber = (phoneRaw) => {
                if (!phoneRaw) return { cleanStr: '', isFixed: false };
                let num = String(phoneRaw).replace(/[^0-9]/g, '').trim(); 
                let isFixed = false;

                if (num.startsWith('66')) {
                    num = '0' + num.slice(2);
                    isFixed = true;
                }
                if (num.length > 10 && num.startsWith('00')) {
                    num = num.slice(1);
                    isFixed = true;
                }
                if (num !== String(phoneRaw).trim()) isFixed = true;

                return { cleanStr: num, isFixed };
            };

            const processUniversalFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!window.XLSX) {
                    showToast("⏳ ระบบกำลังดึงโมดูลอ่านไฟล์คอมพิวเตอร์ กรุณาลองอีกครั้งใน 2 วินาที", "warning");
                    return;
                }

                setIsProcessing(true);
                setProcessLogs(["⚙️ เริ่มอ่านโครงสร้างโมเดลไฟล์..."]);
                
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = window.XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rawRows = window.XLSX.utils.sheet_to_json(ws, { header: 1 });

                        if (rawRows.length === 0) throw new Error("ไม่พบแถวข้อมูลในสเปรดชีต");

                        let headerIndex = 0;
                        let mappings = { tracking: -1, name: -1, phone: -1, address: -1, cod: -1 };

                        const trackingKeywords = ['รหัส', 'พัสดุ', 'tracking', 'track', 'id', 'เลขพัสดุ'];
                        const nameKeywords = ['ชื่อ', 'ผู้รับ', 'customer', 'name', 'ลูกค้า'];
                        const phoneKeywords = ['เบอร์', 'โทร', 'phone', 'tel', 'mobile'];
                        const addressKeywords = ['ที่อยู่', 'address', 'location', 'ส่งที่'];
                        const codKeywords = ['cod', 'ยอดเก็บ', 'เงินปลายทาง', 'ราคา', 'amount', 'ยอดรวม'];

                        for (let i = 0; i < Math.min(rawRows.length, 10); i++) {
                            const row = rawRows[i];
                            if (!row) continue;
                            row.forEach((cell, cellIdx) => {
                                if (!cell) return;
                                const val = String(cell).toLowerCase().trim();
                                if (trackingKeywords.some(k => val.includes(k)) && mappings.tracking === -1) mappings.tracking = cellIdx;
                                if (nameKeywords.some(k => val.includes(k)) && mappings.name === -1) mappings.name = cellIdx;
                                if (phoneKeywords.some(k => val.includes(k)) && mappings.phone === -1) mappings.phone = cellIdx;
                                if (addressKeywords.some(k => val.includes(k)) && mappings.address === -1) mappings.address = cellIdx;
                                if (codKeywords.some(k => val.includes(k)) && mappings.cod === -1) mappings.cod = cellIdx;
                            });
                            if (mappings.tracking !== -1) { headerIndex = i; break; }
                        }

                        if (mappings.tracking === -1) {
                            mappings = { tracking: 0, name: 1, phone: 2, address: 3, cod: 5 };
                            setProcessLogs(prev => [...prev, "⚠️ ไม่พบชื่อหัวข้อหลัก จัดข้อมูลแบบดิฟอลต์ (A-F) ให้แทน"]);
                        } else {
                            setProcessLogs(prev => [...prev, `🎯 ล็อกพิกัดหัวตารางจริงอัตโนมัติที่บรรทัด ${headerIndex + 1}`]);
                        }
const dataRows = rawRows.slice(headerIndex + 1);const listCleaned = [];let validCount = 0;let fixedPhoneCount = 0;let skippedCount = 0;dataRows.forEach((row) => {if (!row || !row[mappings.tracking]) { skippedCount++; return; }const rawPhone = row[mappings.phone] || '';const { cleanStr: cleanPhone, isFixed } = cleanPhoneNumber(rawPhone);if (isFixed) fixedPhoneCount++;validCount++;listCleaned.push({track: String(row[mappings.tracking]).trim(),customer: row[mappings.name] ? String(row[mappings.name]).trim() : 'ไม่ระบุชื่อ',phone: cleanPhone,address: row[mappings.address] ? String(row[mappings.address]).trim() : 'ไม่ระบุที่อยู่',cod: Number(row[mappings.cod]) || 0,raw_phone: String(rawPhone).trim(),isPhoneCleaned: isFixed});});setCleanedData(listCleaned);setCleansingSummary({ totalRaw: rawRows.length, validCount, fixedPhoneCount, skippedCount });setProcessLogs(prev => [...prev, ✅ ประมวลผลเสร็จสิ้น: ล้างข้อมูลพร้อมส่งขึ้นระบบจำนวน ${validCount} รายการ]);setIsProcessing(false);} catch (err) {setProcessLogs(prev => [...prev, ❌ ล้มเหลว: ${err.message}]);setIsProcessing(false);}};reader.readAsBinaryString(file);};const commitToSupabase = async () => {if (cleanedData.length === 0 || !supabaseClient) return;setIsProcessing(true);setProcessLogs(prev => [...prev, "📡 กำลังเชื่อมต่อเกตเวย์ ยิงข้อมูลเข้าสู่ Supabase..."]);try {const payloads = cleanedData.map(item => ({phone: item.phone,customer: item.customer,track: item.track,cod: item.cod,address: item.address,raw_phone: item.raw_phone}));const { error } = await supabaseClient.from(TABLE_NAME).insert(payloads);if (error) throw error;showToast(ข้อมูลซิงค์ตรงฐานข้อมูล Supabase สำเร็จ ${payloads.length} รายการ!);setProcessLogs(prev => [...prev, 🎉 บันทึกธุรกรรมพัสดุจำนวน ${payloads.length} รายการ ลงฐานข้อมูลหลักเสร็จสมบูรณ์]);setCleanedData([]);fetchAdminData();} catch (err) {showToast(เกิดข้อผิดพลาดในการบันทึก: ${err.message}, 'error');setProcessLogs(prev => [...prev, ❌ ส่งข้อมูลล้มเหลว: ${err.message}]);} finally {setIsProcessing(false);}};return ({/* SYSTEM HEADER */}⚡ EMPIRE COMMAND V48.5 // PROD FIX{currentTime.toLocaleTimeString()}{/* METRICS ROW */}SB PARCELS RECORDS{stats.totalOrders} แถวTODAY COD COLLECTED฿{stats.todayCOD.toLocaleString()}GOAL ACHIEVED{((stats.todayCOD/EMPIRE_GOAL)*100).toFixed(1)}%{/* UNIVERSAL DROPZONE */}📥UPLOAD NEW LOGISTICS FILEวางไฟล์ Excel/CSV เพื่อล้าง ลบส่วนเกินเบอร์โทร และเตรียมส่งข้อมูลเข้าฐานข้อมูลเช็คพัสดุ{/* LIVE CONSOLE LOG */}{processLogs.length > 0 && ({processLogs.map((l, i) => {l})})}{/* DATA CLEANSING PREVIEW */}{cleanedData.length > 0 && (🔍 TRANSMISSION VALIDATION MATRIXนำเข้าข้อมูลดิบ: {cleansingSummary.totalRaw} รายการคัดกรองเบอร์โทรแล้ว: {cleansingSummary.fixedPhoneCount} แถว🚀 ยืนยันบันทึกลง SUPABASE ({cleanedData.length} แถว)TRACK (รหัสพัสดุ)CUSTOMER (ชื่อผู้รับ)RAW PHONE (เบอร์เดิม)PHONE (เบอร์ที่ล้างใหม่)ADDRESS (ที่อยู่)COD (ยอดเงิน){cleanedData.map((item, idx) => ({item.track}{item.customer}{item.raw_phone || '-'}<td className={p-2 font-mono font-bold ${item.isPhoneCleaned ? 'text-yellow-400' : 'text-green-400'}}>{item.phone || '-'} {item.isPhoneCleaned && '✨'}{item.address}฿{item.cod.toLocaleString()}))})}{/* DATABASE PREVIEW PANEL */}📡 สตรีมประวัติข้อมูลย้อนหลัง จากตารางใน SUPABASETRACKCUSTOMERPHONECOD{orders.length === 0 ? (NO LIVE STORAGE DATA DETECTED) : orders.map((o, i) => ({o.track}{o.customer}{o.phone}฿{Number(o.cod || 0).toLocaleString()}))}{/* FOOTER */}EMPIRE CORE V48.5 // VERCEL PRODUCTION FIXED{message && ({message.text})});}const root = ReactDOM.createRoot(document.getElementById('root'));root.render();

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMPIRE COMMAND CENTER V48.2 | FINAL</title>
    <!-- 
    ==========================================================================
    🛡️ THE IMMUTABLE PROTOCOL (FINAL CALIBRATION EDITION)
    ==========================================================================
    [VERSION]: V48.2 - FINAL CALIBRATION
    [STATUS]: SNAPSHOT LOCKED (STRUCTURAL SEAL ACTIVATED)
    [AUTHORITY]: User Command Only (DARKSIDE)
    [OPTIMIZATION]: Sizing Hooks Added / Mobile Overlord Architecture
    ==========================================================================
    -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bai+Jamjuree:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style id="theme-style">
        :root { --neon-theme: #ff6600; --dark-bg: #050000; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Bai Jamjuree', sans-serif; overflow-x: hidden; transition: background-color 1s ease; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .neon-glow { text-shadow: 0 0 10px var(--neon-theme), 0 0 20px var(--neon-theme); }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        .neon-border-running {
            position: relative;
            border: 2px solid transparent;
            border-image: conic-gradient(from var(--angle), transparent 50%, var(--neon-theme)) 1;
            animation: rotate-angle 3s linear infinite;
        }
        @keyframes rotate-angle { to { --angle: 360deg; } }
        .custom-scrollbar::-webkit-scrollbar { width: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-theme); }
        .btn-active { background: var(--neon-theme); box-shadow: 0 0 30px var(--neon-theme); color: white; }
        .msg-box { position: fixed; bottom: 20px; right: 20px; left: 20px; padding: 20px; border-radius: 4px; z-index: 1000; text-align: center; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 768px) { .mobile-nav-btn { padding: 1rem 1.5rem !important; font-size: 10px !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SUPABASE_URL = "https://nlgecesyjcrrqwiitlyt.supabase.co";
        const SUPABASE_KEY = "sb_publishable_1agyo85-Uxq1VAllYjl1gg_M_utlMbw";
        const MASTER_PASS = "1234";

        // [COMMANDER CONTROL]: ตั้งชื่อตาราง (LOCKED)
        const TABLE_NAME = "parcels_st"; 

        function App() {
            const [activeTab, setActiveTab] = useState("dashboard");
            const [supabaseClient, setSupabaseClient] = useState(null);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isAudioOn, setIsAudioOn] = useState(false);
            const audioCtx = useRef(null);
            const oscillator = useRef(null);
            const [message, setMessage] = useState(null);
            const [stats, setStats] = useState({ totalOrders: 0, totalCOD: 0, todayCOD: 0, aov: 0 });
            const [orders, setOrders] = useState([]);
            const [adminSearch, setAdminSearch] = useState("");
            const [clickCount, setClickCount] = useState(0);
            const [importStatus, setImportStatus] = useState({ processing: false, count: 0, logs: [] });

            const EMPIRE_GOAL = 100000;

            const ID = useMemo(() => {
                if (TABLE_NAME.includes("_bb")) return { emoji: "📦", color: "#bc13fe", name: "BB STORE", bg: "#0d001a" };
                if (TABLE_NAME.includes("_st")) return { emoji: "🦁", color: "#ff6600", name: "SINGTO STORE", bg: "#050200" };
                return { emoji: "💀", color: "#ff0000", name: "DARKSIDE OPS", bg: "#0a0000" };
            }, [TABLE_NAME]);

            useEffect(() => {
                document.documentElement.style.setProperty('--neon-theme', ID.color);
                document.documentElement.style.setProperty('--dark-bg', ID.bg);
            }, [ID]);

            const toggleSound = () => {
                if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                if (!isAudioOn) {
                    oscillator.current = audioCtx.current.createOscillator();
                    const gainNode = audioCtx.current.createGain();
                    oscillator.current.type = 'sawtooth';
                    oscillator.current.frequency.setValueAtTime(45, audioCtx.current.currentTime);
                    gainNode.gain.setValueAtTime(0.01, audioCtx.current.currentTime);
                    oscillator.current.connect(gainNode);
                    gainNode.connect(audioCtx.current.destination);
                    oscillator.current.start();
                    setIsAudioOn(true);
                } else {
                    oscillator.current.stop();
                    setIsAudioOn(false);
                }
            };

            useEffect(() => {
                const initScripts = () => {
                    const sb = document.createElement('script');
                    sb.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
                    sb.onload = () => setSupabaseClient(window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY));
                    document.body.appendChild(sb);
                    const xlsx = document.createElement('script');
                    xlsx.src = 'https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js';
                    document.body.appendChild(xlsx);
                };
                initScripts();
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (supabaseClient) {
                    fetchAdminData();
                    const refreshInterval = setInterval(fetchAdminData, 60000);
                    return () => clearInterval(refreshInterval);
                }
            }, [supabaseClient, TABLE_NAME]);

            const fetchAdminData = async () => {
                if (!supabaseClient) return;
                try {
                    const { data, error } = await supabaseClient.from(TABLE_NAME).select("*").order("created_at", { ascending: false });
                    if (!error && data) {
                        const totalCOD = data.reduce((sum, item) => sum + Number(item.cod_amount || 0), 0);
                        const todayStr = new Date().toLocaleDateString('en-CA');
                        const todayCOD = data
                            .filter(item => item.created_at && item.created_at.startsWith(todayStr))
                            .reduce((sum, item) => sum + Number(item.cod_amount || 0), 0);
                        setOrders(data);
                        setStats({ totalOrders: data.length, totalCOD, todayCOD, aov: data.length > 0 ? totalCOD / data.length : 0 });
                    }
                } catch (e) { console.error(e); }
            };

            const handleSecretReset = () => {
                setClickCount(prev => prev + 1);
                if (clickCount >= 2) {
                    const pass = prompt("CONFIRM COMMANDER ID:");
                    if (pass === MASTER_PASS) {
                        setStats(prev => ({ ...prev, todayCOD: 0 }));
                    }
                    setClickCount(0);
                }
                setTimeout(() => setClickCount(0), 3000);
            };

            const handleFileUpload = async (event) => {
    const file = event.target.files[0];
    if (!file || !supabaseClient) return;

    setImportStatus({ processing: true, count: 0, logs: ["📡 ปรับจูนโครงสร้างอิสระ..."] });
    
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            
            // ระบบสแกนหัวตารางอัตโนมัติ
            const rawHeader = rows[0].map(h => String(h || "").trim());
            const findIdx = (keywords) => rawHeader.findIndex(h => keywords.some(k => h.includes(k)));
            
            const idx = {
                track: findIdx(["เลขพัสดุ", "พัสดุ", "Order ID"]),
                name: findIdx(["ชื่อผู้รับ", "ชื่อ", "Customer"]),
                phone: findIdx(["เบอร์ผู้รับ", "เบอร์", "Phone"]),
                cod: findIdx(["ยอดCOD", "ยอดเงิน", "COD"]),
                address: findIdx(["ที่อยู่ที่รับ", "ที่อยู่", "Address"])
            };

            const batch = [];
            for(let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const trackVal = row[idx.track > -1 ? idx.track : 3]; // Fallback ไปที่คอลัมน์ 4 ถ้าหาไม่เจอ
                if (!trackVal) continue;

                batch.push({
                    tracking_no: String(trackVal).trim().toUpperCase(),
                    phone_no: String(row[idx.phone > -1 ? idx.phone : 11] || "").replace(/\D/g, ""),
                    consignee_name: String(row[idx.name > -1 ? idx.name : 10] || "ลูกค้า VIP").trim(),
                    address: String(row[idx.address > -1 ? idx.address : 13] || ""),
                    cod_amount: parseFloat(String(row[idx.cod > -1 ? idx.cod : 20] || "0").replace(/[^0-9.]/g, "")) || 0,
                    status: "SHIPPED",
                    updated_at: new Date().toISOString()
                });
            }

            // [TABLE_NAME] ถูกดึงมาจากตัวแปรด้านบนแบบไดนามิก
            const { error } = await supabaseClient.from(TABLE_NAME).upsert(batch, { onConflict: 'tracking_no' });
            if (error) throw error;
            
            setImportStatus({ processing: false, count: batch.length, logs: ["✅ ภารกิจสำเร็จ: อัปโหลดสู่ตาราง " + TABLE_NAME + " เรียบร้อย"] });
            fetchAdminData();
        } catch (err) {
            setImportStatus({ processing: false, count: 0, logs: ["❌ ERROR: " + err.message] });
        }
    };
    reader.readAsArrayBuffer(file);
};

            return (
                <div className="min-h-screen relative p-4 md:p-12 overflow-hidden">
                    <div className="fixed inset-0 pointer-events-none">
                        <div className="absolute top-0 right-1/4 w-[500px] md:w-[900px] h-[500px] md:h-[900px] opacity-[0.25] blur-[150px] rounded-full" style={{ backgroundColor: ID.color }} />
                    </div>

                    <div className="relative z-10 max-w-7xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-center md:items-start mb-10 gap-6">
                            <div className="text-center md:text-left">
                                <div className="flex items-center justify-center md:justify-start gap-3 mb-2">
                                    <span className="text-xl md:text-2xl neon-glow">{ID.emoji}</span>
                                    <h2 className="cyber-font text-lg tracking-[0.4em] font-black uppercase" style={{ color: ID.color }}>{ID.name}</h2>
                                </div>
                                <div className="flex gap-4 items-center justify-center md:justify-start opacity-30">
                                    <p className="cyber-font text-[9px] tracking-[0.2em]">V48.2_FINAL</p>
                                    <button onClick={toggleSound} className="text-[8px] cyber-font px-2 py-0.5 rounded border border-white/20">DRONE: {isAudioOn ? 'ON' : 'OFF'}</button>
                                </div>
                            </div>
                            <div className="neon-border-running px-8 py-4 bg-black/90 rounded-sm text-center">
                                <p className="cyber-font text-[9px] tracking-[0.2em] font-black mb-1 italic opacity-40">UTC_SYNC</p>
                                <p className="cyber-font text-2xl md:text-4xl font-black text-white tracking-[0.1em]">{currentTime.toLocaleTimeString('en-US', { hour12: false })}</p>
                            </div>
                        </div>

                        <div className="flex justify-center mb-10">
                            <div className="inline-flex glass-panel p-1.5 rounded-full shadow-2xl border-white/5 gap-1">
                                {[
                                    { id: 'dashboard', label: 'DASHBOARD', icon: ID.emoji },
                                    { id: 'ops', label: 'OPS_CENTER', icon: '⚡' }
                                ].map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`mobile-nav-btn px-8 md:px-16 py-4 md:py-6 rounded-full cyber-font text-[11px] font-black tracking-[0.3em] transition-all ${activeTab === tab.id ? 'btn-active' : 'text-white/20'}`}
                                    >
                                        {tab.icon} {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {activeTab === "dashboard" && (
                            <div className="animate-in fade-in duration-700 space-y-8 pb-32">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
                                    {[
                                        { label: 'TOTAL_WEALTH', val: `฿${stats.totalCOD.toLocaleString()}`, h: false },
                                        { label: 'TODAY_GAINS', val: `฿${stats.todayCOD.toLocaleString()}`, h: true },
                                        { label: 'CONQUESTS', val: stats.totalOrders.toLocaleString(), h: false },
                                        { label: 'AVG_TICKET', val: `฿${Math.round(stats.aov).toLocaleString()}`, h: false }
                                    ].map((c, i) => (
                                        <div key={i} className={`glass-panel p-6 md:p-10 border-b-4 ${c.h ? 'neon-border-running' : ''}`} style={{ borderBottomColor: c.h || i === 0 ? ID.color : 'rgba(255,255,255,0.05)' }}>
                                            <p className="cyber-font text-[9px] md:text-[11px] text-white/40 tracking-[0.2em] font-black uppercase mb-4">{c.label}</p>
                                            {/* [SIZE_CALIBRATION]: ปรับลดขนาดจาก 2xl/5xl เป็น xl/4xl เพื่อให้เลขครบทุกหลัก */}
                                            <p className="thai-font text-xl md:text-4xl font-black italic text-white tracking-tighter truncate">{c.val}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="neon-border-running glass-panel rounded-sm p-8 md:p-14 relative overflow-hidden">
                                    <div className="flex justify-between items-end mb-8">
                                        <div className="space-y-1">
                                            <h3 className="cyber-font text-xs md:text-xl tracking-[0.4em] font-black uppercase italic" style={{ color: ID.color }}>MISSION: 100K</h3>
                                            <p className="thai-font text-white/20 text-[10px] md:text-sm">{TABLE_NAME}</p>
                                        </div>
                                        <div className="text-right">
                                            {/* [SIZE_CALIBRATION]: ปรับเปอร์เซ็นต์ให้เล็กลงเล็กน้อยเพื่อความพอดี */}
                                            <p className="cyber-font text-xl md:text-5xl font-black text-white italic">{((stats.totalOrders / EMPIRE_GOAL) * 100).toFixed(3)}%</p>
                                            <p onClick={handleSecretReset} className="cyber-font text-[10px] tracking-[0.4em] mt-3 cursor-pointer opacity-20">PRECISION_LOCK</p>
                                        </div>
                                    </div>
                                    <div className="w-full h-4 md:h-6 bg-black/60 rounded-full overflow-hidden border border-white/5 p-1">
                                        <div className="h-full rounded-full transition-all duration-[2000ms]" style={{ width: `${Math.min((stats.totalOrders / EMPIRE_GOAL) * 100, 100)}%`, background: ID.color, boxShadow: `0 0 20px ${ID.color}` }} />
                                    </div>
                                </div>

                                <div className="glass-panel rounded-sm overflow-hidden border-t-2" style={{ borderColor: ID.color }}>
                                    <div className="p-6 md:p-12 border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 bg-black/40">
                                        <h3 className="cyber-font text-[10px] md:text-sm tracking-[0.5em] font-black uppercase" style={{ color: ID.color }}>LIVE_STREAM</h3>
                                        <input type="text" placeholder="สแกนพิกัด..." className="bg-black/80 border border-white/10 rounded-full px-10 py-3 text-xs focus:border-white outline-none w-full md:w-[400px] text-center" value={adminSearch} onChange={(e) => setAdminSearch(e.target.value)} />
                                    </div>
                                    <div className="max-h-[600px] overflow-y-auto custom-scrollbar">
                                        {orders.filter(o => (o.phone_no || "").includes(adminSearch) || (o.tracking_no || "").toLowerCase().includes(adminSearch.toLowerCase())).map((ord, i) => (
                                            <div key={i} className="p-6 border-b border-white/5 flex justify-between items-center group">
                                                <div className="max-w-[60%]"><p className="thai-font text-white text-lg font-black truncate">{ord.consignee_name}</p><p className="cyber-font text-[11px] opacity-40 mt-1 uppercase font-black" style={{ color: ID.color }}>{ord.tracking_no}</p></div>
                                                <div className="text-right">
                                                    {/* [SIZE_CALIBRATION]: ปรับตัวเลขในลิสต์ให้พอดีสายตา */}
                                                    <p className="thai-font font-black text-xl md:text-2xl italic text-white group-hover:neon-glow">฿{Number(ord.cod_amount).toLocaleString()}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === "ops" && (
                            <div className="animate-in slide-in-from-bottom-10 duration-700 max-w-5xl mx-auto space-y-12 py-10 pb-48">
                                <header className="text-center space-y-4">
                                    <h2 className="cyber-font text-5xl md:text-8xl font-black text-white italic uppercase neon-glow">Ops_Center</h2>
                                    <p className="cyber-font text-[10px] md:text-[12px] tracking-[1em] uppercase opacity-40 ml-[1em]" style={{ color: ID.color }}>DB: {TABLE_NAME}</p>
                                </header>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="neon-border-running glass-panel rounded-sm p-12 md:p-24 text-center group cursor-pointer relative shadow-3xl">
                                        <input type="file" onChange={handleFileUpload} accept=".xls,.xlsx" className="absolute inset-0 opacity-0 cursor-pointer z-10" />
                                        <div className="text-8xl md:text-[12rem] mb-8 opacity-90">{ID.emoji}</div>
                                        <p className="cyber-font text-xl md:text-2xl text-white font-black uppercase italic">Deploy_Assets</p>
                                    </div>
                                    <div className="bg-black/98 p-8 md:p-12 rounded-sm font-mono text-[11px] md:text-[13px] h-[400px] md:h-[550px] overflow-y-auto border border-white/5 custom-scrollbar shadow-inner">
                                        <p className="font-black border-b border-white/10 pb-6 mb-8 tracking-[0.6em] uppercase italic text-xs" style={{ color: ID.color }}>#>>> Empire_Log</p>
                                    {importStatus.logs.slice(-10).map((log, i) => ( 
    <p key={i} className="mb-2 text-[10px] opacity-60">... {log}</p> 
))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="fixed bottom-0 left-0 w-full py-10 bg-black/98 backdrop-blur-3xl border-t border-white/5 text-center z-50">
                        <p className="cyber-font text-[9px] text-white/10 font-black tracking-[4em] md:tracking-[8em] uppercase italic ml-[4em] md:ml-[8em]">System_V48.2 • {ID.name}</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
